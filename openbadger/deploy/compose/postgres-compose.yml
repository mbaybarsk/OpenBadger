services:
  postgres:
    image: postgres:17-alpine
    container_name: openbadger-postgres
    environment:
      POSTGRES_DB: openbadger
      POSTGRES_USER: openbadger
      POSTGRES_PASSWORD: openbadger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbadger -d openbadger"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - openbadger-postgres:/var/lib/postgresql/data

volumes:
  openbadger-postgres:
